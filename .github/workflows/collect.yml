name: 📡 每日情報收集

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 00:00（台灣時間早上 08:00）
  workflow_dispatch:        # 手動觸發，方便測試

permissions:
  contents: write           # 需要寫入權限，把 DB commit 回 repo

jobs:
  collect:
    runs-on: ubuntu-latest

    env:
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}

    steps:
      - name: 拉取程式碼和資料庫
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 建立必要資料夾
        run: mkdir -p data logs

      - name: 執行每日情報收集
        run: python pipeline_collect.py

      - name: 儲存資料庫回 GitHub
        run: |
          git config user.name "IndustryRadar Bot"
          git config user.email "action@github.com"
          git add -f data/industry_radar.db
          git diff --staged --quiet || git commit -m "📡 每日情報更新 $(date '+%Y-%m-%d')"
          git pull --rebase
          git push
